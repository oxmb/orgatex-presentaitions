<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><link rel="stylesheet" href="orgatex-mockup.css"></head>
<body>
  <div class="mockup-caption">OX-Label: API-Modus</div>
  <div class="ox-card">
    <div class="ox-card-header">Server-Attribute - OX-Label-0051</div>
    <div class="attr-row">
      <div class="attr-key">Produkt</div>
      <div class="attr-val"><span class="product-tag">OX-Label</span></div>
    </div>
    <div class="attr-row">
      <div class="attr-key">API-Zugriff</div>
      <div class="attr-val true">true</div>
    </div>
    <div class="attr-row">
      <div class="attr-key">Button-Flow</div>
      <div class="attr-val false">false</div>
    </div>
  </div>

  <div class="mockup-caption">OX-Button: Button-Modus</div>
  <div class="ox-card">
    <div class="ox-card-header">Server-Attribute - OX-Button-0003</div>
    <div class="attr-row">
      <div class="attr-key">Produkt</div>
      <div class="attr-val"><span class="product-tag">OX-Button</span></div>
    </div>
    <div class="attr-row">
      <div class="attr-key">API-Zugriff</div>
      <div class="attr-val false">false</div>
    </div>
    <div class="attr-row">
      <div class="attr-key">Button-Flow</div>
      <div class="attr-val true">true</div>
    </div>
    <div class="ox-footer">
      Immer nur ein Modus aktiv. OX-Label wechselt per Flag, OX-Button bleibt Button.
    </div>
  </div>
</body>
</html>
