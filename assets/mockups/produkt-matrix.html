<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><link rel="stylesheet" href="orgatex-mockup.css"></head>
<body>
  <div class="ox-card">
    <div class="ox-card-header">Produkt über Feature-Flags</div>
    <table>
      <thead>
        <tr>
          <th>Produkt</th>
          <th>API-Zugriff</th>
          <th>Button-Flow</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="product-tag">OX-Label</span></td>
          <td><span class="yes">&#10003;</span></td>
          <td><span class="no">&#10007;</span></td>
        </tr>
        <tr>
          <td><span class="product-tag">OX-Button</span></td>
          <td><span class="no">&#10007;</span></td>
          <td><span class="yes">&#10003;</span></td>
        </tr>
      </tbody>
    </table>
    <div class="ox-footer">
      Genau ein Flag ist aktiv, nie beide. OX-Label kann per Flag umschalten, OX-Button bleibt fest auf Button.
    </div>
  </div>
</body>
</html>
