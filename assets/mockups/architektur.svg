<svg xmlns="http://www.w3.org/2000/svg" width="9in" height="4.5in" viewBox="0 0 900 450" font-family="Segoe UI, Helvetica, Arial, sans-serif">

  <!-- Firmennetz zone -->
  <rect x="10" y="10" width="195" height="195" rx="10" fill="#f4f6fa" stroke="#c8d4ea" stroke-width="2"/>
  <text x="107" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#888" letter-spacing="1">FIRMENNETZ</text>
  <!-- Teams box -->
  <rect x="24" y="44" width="167" height="62" rx="7" fill="#e8eeff" stroke="#5a70cc" stroke-width="1.5"/>
  <text x="107" y="71" text-anchor="middle" font-size="16" font-weight="700" fill="#253890">Teams</text>
  <text x="107" y="91" text-anchor="middle" font-size="12" fill="#5a68aa">Bot-Integration</text>
  <!-- E-Mail box -->
  <rect x="24" y="118" width="167" height="62" rx="7" fill="#e8eeff" stroke="#5a70cc" stroke-width="1.5"/>
  <text x="107" y="145" text-anchor="middle" font-size="16" font-weight="700" fill="#253890">E-Mail</text>
  <text x="107" y="165" text-anchor="middle" font-size="12" fill="#5a68aa">Outlook</text>

  <!-- Arrow: Firmennetz → DMZ -->
  <line x1="205" y1="107" x2="232" y2="107" stroke="#b0bfda" stroke-width="2"/>
  <polygon points="232,101 244,107 232,113" fill="#b0bfda"/>

  <!-- DMZ zone -->
  <rect x="244" y="10" width="358" height="195" rx="10" fill="#fef8e8" stroke="#eabb30" stroke-width="2"/>
  <text x="423" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#8a6800" letter-spacing="1">DMZ — PRO BENUTZER</text>
  <!-- Hermes box -->
  <rect x="264" y="44" width="318" height="78" rx="8" fill="#1a3a6b" stroke="#1a3a6b" stroke-width="1.5"/>
  <text x="423" y="81" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">Hermes Agent</text>
  <text x="423" y="104" text-anchor="middle" font-size="13" fill="#a8c0e8">Kontext · Planung · Ausführung</text>
  <!-- Domain badge -->
  <rect x="313" y="134" width="220" height="28" rx="5" fill="#fff3c0" stroke="#eabb30" stroke-width="1.5"/>
  <text x="423" y="153" text-anchor="middle" font-size="13" fill="#8a6800" font-family="Consolas, monospace">*.ai.orgatex.de</text>

  <!-- Arrow: DMZ → Internes Netz -->
  <line x1="602" y1="107" x2="629" y2="107" stroke="#b0bfda" stroke-width="2"/>
  <polygon points="629,101 641,107 629,113" fill="#b0bfda"/>

  <!-- Internes Netz zone -->
  <rect x="641" y="10" width="249" height="195" rx="10" fill="#edf6f0" stroke="#78ba8a" stroke-width="2"/>
  <text x="765" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#3a7a50" letter-spacing="1">INTERNES NETZ</text>
  <!-- LLM box -->
  <rect x="658" y="44" width="215" height="78" rx="7" fill="#fff8e0" stroke="#eabb30" stroke-width="1.5"/>
  <text x="765" y="81" text-anchor="middle" font-size="16" font-weight="700" fill="#7a5800">LLM-Server</text>
  <text x="765" y="104" text-anchor="middle" font-size="12" fill="#a07820">Ollama · srv-mac-01</text>

  <!-- Down arrow from DMZ -->
  <line x1="423" y1="205" x2="423" y2="232" stroke="#b0bfda" stroke-width="2"/>
  <polygon points="417,232 423,244 429,232" fill="#b0bfda"/>

  <!-- Datenquellen label -->
  <text x="423" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#3a7a50" letter-spacing="1">DATENQUELLEN</text>

  <!-- Source boxes -->
  <!-- Outlook -->
  <rect x="105" y="272" width="120" height="56" rx="7" fill="#eaf4ee" stroke="#78ba8a" stroke-width="1.5"/>
  <text x="165" y="298" text-anchor="middle" font-size="15" font-weight="700" fill="#1a5c30">Outlook</text>
  <text x="165" y="317" text-anchor="middle" font-size="11" fill="#3a7a50">E-Mail</text>
  <!-- Kalender -->
  <rect x="237" y="272" width="120" height="56" rx="7" fill="#eaf4ee" stroke="#78ba8a" stroke-width="1.5"/>
  <text x="297" y="298" text-anchor="middle" font-size="15" font-weight="700" fill="#1a5c30">Kalender</text>
  <text x="297" y="317" text-anchor="middle" font-size="11" fill="#3a7a50">M365</text>
  <!-- CRM -->
  <rect x="369" y="272" width="120" height="56" rx="7" fill="#eaf4ee" stroke="#78ba8a" stroke-width="1.5"/>
  <text x="429" y="298" text-anchor="middle" font-size="15" font-weight="700" fill="#1a5c30">CRM</text>
  <text x="429" y="317" text-anchor="middle" font-size="11" fill="#3a7a50">Kundendaten</text>
  <!-- Web -->
  <rect x="501" y="272" width="120" height="56" rx="7" fill="#eaf4ee" stroke="#78ba8a" stroke-width="1.5"/>
  <text x="561" y="298" text-anchor="middle" font-size="15" font-weight="700" fill="#1a5c30">Web</text>
  <text x="561" y="317" text-anchor="middle" font-size="11" fill="#3a7a50">Recherche</text>
  <!-- More -->
  <rect x="633" y="272" width="80" height="56" rx="7" fill="#f5f5f5" stroke="#ccc" stroke-width="1.5"/>
  <text x="673" y="308" text-anchor="middle" font-size="22" fill="#aaa">···</text>

  <!-- Footer line -->
  <line x1="10" y1="352" x2="890" y2="352" stroke="#e8e8e8" stroke-width="1"/>
  <text x="450" y="373" text-anchor="middle" font-size="12" fill="#888">
    <tspan font-weight="700" fill="#444">Alle Daten bleiben im internen Netz</tspan>
    <tspan> — kein externer KI-Dienst, kein Datentransfer nach aussen</tspan>
  </text>

</svg>
